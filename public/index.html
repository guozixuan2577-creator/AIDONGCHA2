<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>巴基斯坦手机用户小镇</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI Insights Town</p>
          <h1>巴基斯坦手机用户小镇</h1>
        </div>
        <button id="refreshBtn" class="icon-button" type="button" title="刷新">↻</button>
        <span id="healthBadge" class="status-pill">加载中</span>
      </header>

      <main class="workspace">
        <section class="panel chat-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Town Brain</p>
              <h2>和深访 Agent 对话</h2>
            </div>
            <div class="segmented">
              <button class="segment active" data-mode="single" type="button">单聊</button>
              <button class="segment" data-mode="town" type="button">群聊</button>
            </div>
          </div>

          <div class="chat-controls">
            <label class="field">
              <span>居民 Agent</span>
              <select id="agentSelect"></select>
            </label>
            <label class="field">
              <span>覆盖范围</span>
              <select id="coverageMode">
                <option value="broad">尽量覆盖深访多方面</option>
                <option value="focused">聚焦当前问题</option>
              </select>
            </label>
            <label class="field">
              <span>输出语言</span>
              <select id="languageSelect">
                <option value="zh">中文</option>
                <option value="en">English</option>
              </select>
            </label>
            <label class="field">
              <span>主观程度 <strong id="subjectivityValue">50</strong></span>
              <input id="subjectivityLevel" type="range" min="0" max="100" step="5" value="50" />
            </label>
          </div>

          <label class="field question-field">
            <span>问题</span>
            <textarea id="questionInput" rows="5" placeholder="例如：这个用户是怎样的人？他或她如何看待换手机、预算、品牌和功能？"></textarea>
          </label>

          <div class="button-row">
            <button id="askBtn" class="primary-button" type="button">提问</button>
            <button id="sampleBtn" class="ghost-button" type="button">示例问题</button>
          </div>

          <div id="answerArea" class="answer-area">
            <p class="empty-state">选择单个 Agent 或全镇群聊，然后输入问题。</p>
          </div>
        </section>

        <section class="panel agents-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Agents</p>
              <h2>8 位深访用户</h2>
            </div>
            <span id="agentCount" class="status-pill">0 位</span>
          </div>
          <div id="agentList" class="agent-list"></div>
        </section>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
